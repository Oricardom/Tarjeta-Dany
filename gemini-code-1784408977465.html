<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis XV Años - Daniela</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            color: #fff;
            background-color: #1a1a1a; /* Color de fondo de seguridad */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        /* Contenedor principal de la invitación */
        .invitation-container {
            width: 100%;
            max-width: 480px; /* Ancho típico de móvil */
            height: 100vh; /* Ocupa toda la altura de la pantalla */
            position: relative;
            background-image: url('image_0.png'); /* Usamos la imagen de referencia */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 0;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Efecto de superposición para legibilidad (opcional, si la imagen es muy clara) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.4));
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Título: Daniela */
        h1.name {
            font-family: 'Great Vibes', cursive; /* Fuente caligráfica elegante, importar abajo */
            font-size: 4em;
            color: #FFD700; /* Dorado */
            margin: 10px 0 5px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            animation: fadeInDown 2s ease;
        }

        h2.subtitle {
            font-size: 1.2em;
            color: #f8f8f8;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Estilo para la información */
        .info-block {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 15px;
            margin: 10px auto;
            width: 85%;
            border: 1px solid #C0C0C0; /* Plateado */
        }

        .info-item {
            margin: 10px 0;
            font-size: 1.1em;
            line-height: 1.4;
        }

        .info-item strong {
            color: #FFD700; /* Dorado para resaltar */
        }

        /* Cuenta regresiva */
        .countdown-container {
            margin-top: 30px;
            width: 90%;
        }

        .countdown-title {
            font-size: 1.3em;
            color: #FF69B4; /* Magenta */
            margin-bottom: 10px;
            font-weight: bold;
        }

        #countdown {
            display: flex;
            justify-content: space-around;
            width: 100%;
        }

        .countdown-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #FF69B4;
            border-radius: 10px;
            padding: 10px;
            width: 22%;
            text-align: center;
            backdrop-filter: blur(5px); /* Efecto vidrio */
        }

        .countdown-number {
            font-size: 2em;
            font-weight: bold;
            color: #FFD700;
        }

        .countdown-label {
            font-size: 0.8em;
            color: #f8f8f8;
        }

        /* Botones de acción */
        .action-buttons {
            margin-top: 30px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn {
            display: block;
            width: 70%;
            padding: 12px 20px;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 30px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-whatsapp {
            background-color: #FF69B4; /* Magenta */
            color: white;
            border: 2px solid #C0C0C0; /* Borde Plateado */
        }

        .btn-whatsapp:hover {
            background-color: #e05a9e;
            transform: scale(1.05);
        }

        .btn-location {
            background-color: transparent; /* Fondo transparente */
            color: white;
            border: 2px solid #C0C0C0; /* Borde Plateado */
        }

        .btn-location:hover {
            background-color: rgba(255,255,255,0.1);
            transform: scale(1.05);
        }

        /* Animaciones */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Importar fuentes (Great Vibes) */
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

        /* Ajuste responsivo para pantallas muy grandes (PC) */
        @media (min-width: 768px) {
             .invitation-container {
                box-shadow: 0 10px 25px rgba(0,0,0,0.7);
             }
        }
    </style>
</head>
<body>

<div class="invitation-container">
    <div class="overlay"></div>
    <div class="content">
        <h1 class="name">Daniela</h1>
        <h2 class="subtitle">Mis Quince Años</h2>

        <div class="info-block">
            <div class="info-item">📅 <strong>Sábado 29 de Agosto</strong></div>
            <div class="info-item">🕕 <strong>6:00 PM</strong></div>
            <div class="info-item">📍 <strong>Edif. Sandra · Salón de Eventos San Francisco</strong></div>
        </div>

        <div class="info-block">
            <div class="info-item">👗 <strong>Código de Vestimenta:</strong> Formal</div>
            <div class="info-item">🎨 <strong>Color Reservado:</strong> Magenta y Plateado</div>
        </div>

        <div class="countdown-container">
            <div class="countdown-title">⏳ ¡Falta muy poco! ⏳</div>
            <div id="countdown">
                <div class="countdown-box"><span id="days" class="countdown-number">00</span><br><span class="countdown-label">Días</span></div>
                <div class="countdown-box"><span id="hours" class="countdown-number">00</span><br><span class="countdown-label">Horas</span></div>
                <div class="countdown-box"><span id="minutes" class="countdown-number">00</span><br><span class="countdown-label">Minutos</span></div>
                <div class="countdown-box"><span id="seconds" class="countdown-number">00</span><br><span class="countdown-label">Segundos</span></div>
            </div>
        </div>

        <div class="action-buttons">
            <a href="https://wa.me/573225685161?text=¡Hola! Confirmo mi asistencia a los XV Años de Daniela." class="btn btn-whatsapp" target="_blank">📞 Confirmar Asistencia</a>
            <a href="https://maps.app.goo.gl/tu_ubicacion_aqui" class="btn btn-location" target="_blank">🗺️ Ver Ubicación</a>
            <!-- Reemplaza la URL de maps.app.goo.gl/tu_ubicacion_aqui con el enlace real a Google Maps del lugar -->
        </div>
    </div>
</div>

<script>
    // Configuración de la fecha del evento
    // Nota: Los meses en JavaScript van de 0 (Enero) a 11 (Diciembre). Agosto es el 7.
    const eventDate = new Date('August 29, 2025 18:00:00').getTime();

    const countdown = setInterval(function() {
        const now = new Date().getTime();
        const distance = eventDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").innerHTML = days < 10 ? '0' + days : days;
        document.getElementById("hours").innerHTML = hours < 10 ? '0' + hours : hours;
        document.getElementById("minutes").innerHTML = minutes < 10 ? '0' + minutes : minutes;
        document.getElementById("seconds").innerHTML = seconds < 10 ? '0' + seconds : seconds;

        if (distance < 0) {
            clearInterval(countdown);
            document.getElementById("countdown").innerHTML = "¡Es hoy!";
        }
    }, 1000);
</script>

</body>
</html>
